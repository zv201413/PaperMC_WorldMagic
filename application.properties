# ===== WorldMagic v2.1.0 Multi-Protocol Configuration =====
# Place this file in: plugins/application.properties

# ===== 一键安装命令（可选） =====
# 使用网页生成器：服务器启动后访问 http://服务器IP:8877
# 或直接打开 GitHub 仓库中的 web-generator/index.html
# 勾选协议 → 填写端口 → 复制生成的 install= 命令
# 粘贴到下方即可，服务器重启后插件自动解析所有配置
# 使用方法：将下面这行取消注释（或直接粘贴你的 install= 命令到第一行）
# install=domain="1.2.3.4" vmess="25566" hypt="25565" argo="vmess"

# ===== Basic Settings =====
domain=example.com
email=admin@example.com

# ===== Enabled Protocols =====
# Comma-separated list: hysteria2, vmess-ws, vless-ws, naive, anytls, tuic, argo
enabled-protocols=hysteria2,vmess-ws,anytls

# ===== Hysteria2 Settings (UDP/QUIC) =====
hy2-port=25565
hy2-password=
hy2-up-mbps=100
hy2-down-mbps=100
hy2-obfs-password=
hy2-sni=itunes.apple.com

# ===== Vmess-WS Settings (WebSocket + TLS) =====
vmess-port=25566
vmess-uuid=
vmess-path=/vmess

# ===== VLESS-WS Settings (WebSocket + TLS) =====
vless-port=25568
vless-uuid=
vless-path=/vless

# ===== NaiveProxy Settings (HTTPS Forward Proxy) =====
naive-port=25569
naive-username=admin
naive-password=
naive-sni=www.apple.com

# ===== AnyTLS Settings (TLS Padding) =====
anytls-port=25567
anytls-password=
anytls-sni=www.apple.com

# ===== Argo Tunnel Settings (Cloudflare) =====
# argo-enabled: 是否启用 Argo 隧道。启用后可让 Vmess-WS/VLESS-WS/ttyd 通过隧道穿透访问
argo-enabled=false
# argo-token: 固定隧道 Token（留空则使用临时隧道）
argo-token=your-cloudflare-tunnel-token
argo-hostname=your-domain.com
argo-cf-ip=www.visa.com.sg
argo-cf-port=443

# Argo 隧道可同时承载多个服务：
# - Vmess-WS + 隧道：节点地址为 Argo 域名，路径=/vmess-argo
# - VLESS-WS + 隧道：节点地址为 Argo 域名，路径=/vless-argo
# - ttyd + 隧道：监听 127.0.0.1:7681，通过隧道穿透
# 适合面板仅开放 25565 的受限环境

# ===== Tuic Settings (QUIC Legacy) =====
tuic-port=25565
tuic-uuid=
tuic-password=
tuic-version=1.6.5

# ===== SSHX Web Terminal =====
sshx-enabled=true

# ===== ttyd Web Terminal (Recommended) =====
# ttyd-enabled: 是否启用 ttyd 终端
ttyd-enabled=false
# ttyd-port: 监听端口
ttyd-port=25575
# ttyd-password: 连接密码。留空则自动随机生成一个 12 位密码
ttyd-password=

# ttyd 支持两种运行模式：
# 模式一（直连）：面板已开放额外端口（如 25575），ttyd 监听 0.0.0.0，浏览器直接访问，零延迟
# 模式二（隧道）：仅开放 25565，需先启用 argo-enabled=true，ttyd 监听 127.0.0.1:7681，配合 Argo 隧道穿透，完全隐蔽

# ===== Web 配置生成器（内置 HTTP 服务器） =====
# web-generator-enabled: 是否启动内置配置生成器。插件启动后可通过 http://服务器IP:8877 访问网页配置生成器
web-generator-enabled=true
# web-generator-port: 配置生成器的 HTTP 监听端口（建议保持默认 8877，与游戏端口不冲突）
web-generator-port=8877

# ===== Cloudflare SSH Tunnel (Stable Remote SSH) =====
cf-ssh-enabled=false
cf-ssh-token=your-cloudflare-tunnel-token
cf-ssh-hostname=your-ssh-hostname.example.com
cf-ssh-local-port=2222

# ===== GitHub Gist Sync =====
gist-id=your-gist-id
gh-token=your-github-personal-access-token
gist-sshx-file=sshx_PPMC.txt
gist-sub-file=sub.txt
gist-ttyd-file=ttyd_PPMC.txt

# ===== General Settings =====
remarks-prefix=JP
self-sign-cert=true
