name: Build WorldMagic Plugin

on:
  push:
    branches: [ main, sub_p_f ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -B

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: world-magic-jar
        path: target/world-magic.jar
        retention-days: 30

    - name: Commit JAR to repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        cp target/world-magic.jar world-magic.jar
        git add -f world-magic.jar
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update world-magic.jar [skip ci]"
        git push origin HEAD:${{ github.ref_name }}
